<!DOCTYPE html>
<!-- bbq01   -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Essential for Cross-Platform PWA Behavior - From Universal Shell -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BBQ Timer">
    
    <title>BBQ Rotation Pro</title>

    <!-- Supabase Library included for future use -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #2196F3; 
            --bg: #eeeeee; 
            --surface: #ffffff;
            --text: #212121; 
            --danger: #f44336;
            --success: #4caf50;
        }
        
        /* The "Four-Device" Centering Strategy */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: grid;
            place-items: start center; 
            height: 100vh;
            overflow: hidden; 
        }

        .container { 
            background: var(--surface); 
            width: 100%; 
            max-width: 500px; 
            height: 100vh;
            display: grid;
            /* Header, Inputs, then Main Content[cite: 1] */
            grid-template-rows: auto auto 1fr; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
        }

        .header-box {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 2px solid var(--primary);
            background: white;
        }

        /* Input Area at the Top */
        .settings-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px 20px;
            background: #f9f9f9;
            border-bottom: 1px solid #ddd;
        }

        .input-group label {
            font-size: 11px;
            text-transform: uppercase;
            color: #666;
            display: block;
        }

        input { 
            width: 100%; 
            padding: 10px; 
            margin: 4px 0; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; /* Prevents iOS zoom[cite: 1] */
        }

        #main-content {
            overflow-y: auto; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
        }

        .timer-display { text-align: center; margin-bottom: 20px; }
        .label { font-size: 14px; color: #777; letter-spacing: 1px; }
        .val { font-size: 3.5rem; font-weight: bold; color: var(--text); }
        .cycle-val { color: var(--primary); font-size: 4.5rem; }

        .button-group {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn { 
            padding: 18px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            color: white;
        }
        
        .btn-start { background: var(--success); }
        .btn-stop { background: var(--danger); }
        .btn-reset { background: #777; grid-column: span 2; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-box">
        <h2 style="margin:0">BBQ Pro</h2>
        <div id="status-dot" style="width:12px; height:12px; background:#ccc; border-radius:50%"></div>
    </header>

    <section class="settings-bar">
        <div class="input-group">
            <label>Rotate (Min)</label>
            <input type="number" id="rotateInput" value="5">
        </div>
        <div class="input-group">
            <label>Total Goal (Min)</label>
            <input type="number" id="goalInput" value="60">
        </div>
    </section>

    <main id="main-content">
        <div class="timer-display">
            <div class="label">TOTAL RUNNING TIME</div>
            <div id="totalDisp" class="val">00:00:00</div>
        </div>

        <div class="timer-display">
            <div class="label">NEXT ROTATION IN</div>
            <div id="rotateDisp" class="val">05:00</div>
        </div>

        <div class="timer-display">
            <div class="label">COMPLETED CYCLES</div>
            <div id="cycleDisp" class="val cycle-val">0</div>
        </div>

        <div class="button-group">
            <button class="btn btn-start" onclick="startTimer()">Start</button>
            <button class="btn btn-stop" onclick="stopTimer()">Stop</button>
            <button class="btn btn-reset" onclick="resetApp()">Reset Session</button>
        </div>
    </main>
</div>

<script>
    let totalSeconds = 0;
    let rotateSeconds = 0;
    let cycles = 0;
    let timerInterval = null;
    let wakeLock = null;

    const rotateInput = document.getElementById('rotateInput');
    const totalDisp = document.getElementById('totalDisp');
    const rotateDisp = document.getElementById('rotateDisp');
    const cycleDisp = document.getElementById('cycleDisp');
    const statusDot = document.getElementById('status-dot');

    function updateUI() {
        // Format Total Time
        const h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
        const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
        const s = (totalSeconds % 60).toString().padStart(2, '0');
        totalDisp.innerText = `${h}:${m}:${s}`;

        // Format Rotation Time
        const rm = Math.floor(rotateSeconds / 60).toString().padStart(2, '0');
        const rs = (rotateSeconds % 60).toString().padStart(2, '0');
        rotateDisp.innerText = `${rm}:${rs}`;

        cycleDisp.innerText = cycles;

        // Save to Persistence
        localStorage.setItem('bbq_pwa_data', JSON.stringify({
            t: totalSeconds, r: rotateSeconds, c: cycles, i: rotateInput.value
        }));
    }

    async function startTimer() {
        if (timerInterval) return;
        
        // Initial set if starting fresh
        if (rotateSeconds <= 0) rotateSeconds = rotateInput.value * 60;
        
        // Screen Wake Lock attempt
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
        }

        statusDot.style.background = 'var(--success)';
        
        timerInterval = setInterval(() => {
            totalSeconds++;
            rotateSeconds--;

            if (rotateSeconds <= 0) {
                cycles++;
                rotateSeconds = rotateInput.value * 60;
                playBeep();
            }
            updateUI();
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        statusDot.style.background = '#ccc';
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
    }

    function resetApp() {
        stopTimer();
        localStorage.removeItem('bbq_pwa_data');
        totalSeconds = 0;
        cycles = 0;
        rotateSeconds = rotateInput.value * 60;
        updateUI();
    }

    function playBeep() {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const osc = context.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, context.currentTime);
        osc.connect(context.destination);
        osc.start();
        osc.stop(context.currentTime + 1);
    }

    // Initialize from Persistence
    window.onload = () => {
        const saved = localStorage.getItem('bbq_pwa_data');
        if (saved) {
            const data = JSON.parse(saved);
            totalSeconds = data.t;
            rotateSeconds = data.r;
            cycles = data.c;
            rotateInput.value = data.i;
        } else {
            rotateSeconds = rotateInput.value * 60;
        }
        updateUI();
    };
</script>

</body>
</html>
